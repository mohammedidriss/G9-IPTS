# =============================================================================
# IPTS — Docker Compose
# Usage:
#   docker-compose up -d          # Start all services
#   docker-compose logs -f ipts   # Follow logs
#   docker-compose down           # Stop
# =============================================================================

version: "3.9"

services:

  # ── Main IPTS Application ─────────────────────────────────────────────────
  ipts:
    build: .
    container_name: ipts-app
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ipts_models:/app/models          # Persist trained ML models
      - ipts_db:/app/.runtime            # Persist SQLite database
      - ipts_logs:/var/log/ipts
    environment:
      - FLASK_ENV=production
      - IPTS_PORT=5000
      - IPTS_HOST=0.0.0.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  # ── Nginx Reverse Proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: ipts-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/ipts.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro          # Place your SSL certs here
      - ipts_logs:/var/log/nginx
    depends_on:
      ipts:
        condition: service_healthy

  # ── Ollama LLM (optional — comment out if not needed) ────────────────────
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: ipts-ollama
  #   restart: unless-stopped
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_models:/root/.ollama
  #   # Pull model on first start:
  #   # docker exec ipts-ollama ollama pull llama3.2:3b

volumes:
  ipts_models:
  ipts_db:
  ipts_logs:
  # ollama_models:
